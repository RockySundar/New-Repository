<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RathaKrishnan G | SEO Executive & Technical Shopify SEO</title>
  <meta name="description" content="Portfolio of RathaKrishnan G, SEO Executive specializing in Technical SEO and Shopify SEO. 2+ years driving organic growth through data-driven strategy." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <script>
    (function () {
      const saved = localStorage.getItem('theme');
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (systemDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <style>
    :root {
      --bg: #f7f9fc;
      --surface: #ffffff;
      --surface-2: #eef3f8;
      --border: #d9e2ec;
      --text: #132238;
      --text-dim: #4e5d6c;
      --text-faint: #7a8793;
      --accent: #2f6fed;
      --accent-soft: rgba(47, 111, 237, 0.10);
      --growth: #1f9d72;
      --growth-soft: rgba(31, 157, 114, 0.10);
      --amber: #c98200;
      --amber-soft: rgba(201, 130, 0, 0.10);
      --shadow: 0 10px 30px rgba(18, 38, 63, 0.06);
      --radius-sm: 6px;
      --radius: 12px;
      --radius-lg: 20px;
      --font-display: "Space Grotesk", sans-serif;
      --font-body: "Inter", sans-serif;
      --font-mono: "IBM Plex Mono", monospace;
      --max-w: 1140px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    html[data-theme="dark"] {
      --bg: #0b0f14;
      --surface: #121820;
      --surface-2: #171f29;
      --border: #232d39;
      --text: #e7edf3;
      --text-dim: #93a0ad;
      --text-faint: #5c6975;
      --accent: #4f9cf9;
      --accent-soft: rgba(79, 156, 249, 0.12);
      --growth: #33d9a3;
      --growth-soft: rgba(51, 217, 163, 0.12);
      --amber: #f2b155;
      --amber-soft: rgba(242, 177, 85, 0.12);
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      background-image: radial-gradient(ellipse 900px 500px at 15% -10%, rgba(79,156,249,0.10), transparent 60%),
                        radial-gradient(ellipse 700px 500px at 100% 10%, rgba(51,217,163,0.06), transparent 60%);
      background-repeat: no-repeat;
      transition: background 0.25s var(--ease), color 0.25s var(--ease);
    }

    img { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    button, input, textarea { font-family: inherit; }
    button { cursor: pointer; }

    section {
      padding: 96px 0;
      position: relative;
    }

    .container {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 24px;
    }

    h1, h2, h3, h4 {
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 12.5px;
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(79,156,249,0.25);
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 22px;
      letter-spacing: 0.01em;
    }

    .eyebrow .domain { color: var(--text-faint); }
    .eyebrow .slash { color: var(--text-faint); }

    .section-head {
      max-width: 640px;
      margin-bottom: 56px;
    }

    .section-head h2 {
      font-size: clamp(1.7rem, 3.2vw, 2.4rem);
      margin-bottom: 14px;
    }

    .section-head p {
      color: var(--text-dim);
      font-size: 1.02rem;
    }

    header.site-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(247,249,252,0.80);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--border);
      transition: background 0.25s var(--ease), border-color 0.25s var(--ease);
    }

    html[data-theme="dark"] header.site-nav {
      background: rgba(11,15,20,0.72);
    }

    .nav-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text);
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--growth));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13px;
      color: #081018;
    }

    .brand .url-bar { color: var(--text-faint); }
    .brand .url-bar b { color: var(--text); font-weight: 500; }

    nav.primary-links { display: none; }
    nav.primary-links ul {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    nav.primary-links a {
      font-size: 14px;
      color: var(--text-dim);
      padding: 8px 14px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    nav.primary-links a:hover {
      color: var(--text);
      background: var(--surface-2);
    }

    nav.primary-links a.cta-link {
      color: #061019;
      background: var(--accent);
      font-weight: 600;
    }

    nav.primary-links a.cta-link:hover {
      background: color-mix(in srgb, var(--accent) 92%, white);
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      box-shadow: var(--shadow);
    }

    .theme-toggle span {
      font-size: 13px;
      font-weight: 600;
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      align-items: center;
    }

    .hamburger span {
      width: 18px;
      height: 2px;
      background: var(--text);
      transition: transform 0.3s var(--ease), opacity 0.3s var(--ease);
    }

    .mobile-menu {
      max-height: 0;
      overflow: hidden;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      transition: max-height 0.35s var(--ease);
    }

    .mobile-menu.open { max-height: 320px; }
    .mobile-menu ul {
      padding: 8px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .mobile-menu a {
      display: block;
      padding: 12px 4px;
      font-size: 15px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }

    .mobile-menu li:last-child a { border-bottom: none; }
    .mobile-menu a:hover { color: var(--accent); }

    .hero {
      padding: 168px 0 100px;
      min-height: 92vh;
      display: flex;
      align-items: center;
    }

    .hero-inner {
      display: grid;
      gap: 56px;
    }

    .hero-copy h1 {
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      line-height: 1.08;
      margin-bottom: 20px;
    }

    .hero-copy h1 .hl {
      background: linear-gradient(90deg, var(--accent), var(--growth));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-copy .sub {
      font-size: 1.08rem;
      color: var(--text-dim);
      max-width: 520px;
      margin-bottom: 34px;
    }

    .hero-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 24px;
      border-radius: 10px;
      font-size: 14.5px;
      font-weight: 600;
      transition: transform 0.25s var(--ease), box-shadow 0.25s var(--ease), background 0.25s var(--ease), border-color 0.25s;
      border: 1px solid transparent;
    }

    .btn-primary {
      background: var(--accent);
      color: #06111c;
    }

    .btn-ghost {
      background: transparent;
      border-color: var(--border);
      color: var(--text);
    }

    .btn-primary:hover,
    .btn-ghost:hover,
    .theme-toggle:hover {
      transform: translateY(-2px);
    }

    .hero-meta {
      display: flex;
      gap: 26px;
      flex-wrap: wrap;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-faint);
    }

    .hero-meta span b {
      color: var(--text);
      font-weight: 500;
    }

    .card, .chart-card, .skill-cat, .exp-card, .project-card, .contact-form, .contact-link, .credential-card, .achieve-card {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .chart-card {
      border-radius: var(--radius-lg);
      padding: 26px 22px 18px;
      position: relative;
      overflow: hidden;
    }

    .chart-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(500px 260px at 100% 0, rgba(51,217,163,0.08), transparent 70%);
      pointer-events: none;
    }

    .chart-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 22px;
    }

    .chart-head .label {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .chart-head .stat {
      font-family: var(--font-display);
      font-size: 2rem;
      color: var(--growth);
      font-weight: 700;
    }

    .chart-head .stat small {
      font-size: 0.95rem;
      color: var(--text-dim);
      font-family: var(--font-mono);
      font-weight: 400;
      margin-left: 6px;
    }

    .chart-tag {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--growth);
      background: var(--growth-soft);
      border: 1px solid rgba(51,217,163,0.3);
      padding: 5px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .chart-svg-wrap svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .chart-path {
      stroke-dasharray: 900;
      stroke-dashoffset: 900;
      animation: draw 2.1s var(--ease) 0.4s forwards;
    }

    .chart-area {
      opacity: 0;
      animation: fadein 1.4s var(--ease) 1.6s forwards;
    }

    @keyframes draw { to { stroke-dashoffset: 0; } }
    @keyframes fadein { to { opacity: 1; } }

    .chart-foot {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-faint);
    }

    .about-grid, .skills-cols, .project-grid, .contact-grid, .achieve-grid {
      display: grid;
      gap: 24px;
    }

    .credential-card, .skill-cat, .exp-card, .project-card, .contact-form, .contact-link, .achieve-card {
      border-radius: var(--radius);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      font-size: 12.5px;
      font-family: var(--font-mono);
      color: var(--text-dim);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 6px;
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--text);
      transform: translateY(-2px);
    }

    .project-card:hover {
      transform: translateY(-6px);
      border-color: rgba(79,156,249,0.4);
      box-shadow: 0 20px 40px -20px rgba(0,0,0,0.18);
    }

    .contact-form {
      padding: clamp(22px, 4vw, 36px);
      display: grid;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field input,
    .field textarea {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14.5px;
    }

    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .field textarea {
      resize: vertical;
      min-height: 110px;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 30px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      text-align: center;
    }

    @media (min-width: 640px) {
      footer {
        flex-direction: row;
        justify-content: space-between;
      }
    }

    @media (min-width: 860px) {
      nav.primary-links { display: block; }
      .hamburger { display: none; }
      .mobile-menu { display: none; }
    }

    @media (min-width: 900px) {
      .hero-inner {
        grid-template-columns: 1.05fr 0.95fr;
        align-items: center;
      }
      .about-grid {
        grid-template-columns: 0.85fr 1.15fr;
        align-items: start;
      }
      .contact-grid {
        grid-template-columns: 1.2fr 0.8fr;
      }
    }
  </style>
</head>
<body>
  <header class="site-nav">
    <div class="nav-inner">
      <a href="#home" class="brand" aria-label="RathaKrishnan G home">
        <span class="brand-mark">RG</span>
        <span class="url-bar"><b>rathakrishnan</b>.dev</span>
      </a>

      <nav class="primary-links" aria-label="Primary">
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#about">About</a></li>
          <li><a href="#experience">Experience</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="#contact" class="cta-link">Contact</a></li>
        </ul>
      </nav>

      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle color theme">
        <span id="themeIcon">🌙</span>
        <span id="themeText">Dark</span>
      </button>

      <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false" aria-controls="mobileMenu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="mobile-menu" id="mobileMenu">
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#experience">Experience</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </div>
  </header>

  <main>
    <!-- keep your existing sections here -->
  </main>

  <footer>
    <p>© 2026 RathaKrishnan G. Built for SEO, speed, and clarity.</p>
    <div class="foot-links">
      <a href="#home">Home</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </div>
  </footer>

  <script>
    const root = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const themeText = document.getElementById('themeText');
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    function setTheme(theme) {
      root.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      const isDark = theme === 'dark';
      themeIcon.textContent = isDark ? '🌙' : '☀️';
      themeText.textContent = isDark ? 'Dark' : 'Light';
      toggle.setAttribute('aria-label', isDark ? 'Switch to light theme' : 'Switch to dark theme');
    }

    setTheme(root.getAttribute('data-theme') || 'light');

    toggle.addEventListener('click', () => {
      const current = root.getAttribute('data-theme') || 'light';
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    hamburger.addEventListener('click', () => {
      const open = mobileMenu.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', String(open));
    });
  </script>
</body>
</html>
